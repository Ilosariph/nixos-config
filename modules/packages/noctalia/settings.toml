config_version = 2

[bar.main]
center = [ "workspaces" ]
end = [ "tray", "notifications", "network", "battery", "control-center" ]
margin_ends = 0
radius = 0
start = [ "launcher", "group:g2", "group:g1", "media" ]
widget_spacing = 12

    [[bar.main.capsule_group]]
    enabled = true
    fill = "outline"
    id = "g1"
    members = [ "cpu", "temp", "ram" ]
    opacity = 1.0
    padding = 6.0

    [[bar.main.capsule_group]]
    enabled = true
    fill = "outline"
    id = "g2"
    members = [ "clock", "date" ]
    opacity = 1.0
    padding = 6.0

[control_center]
hidden_tabs = [ "power", "screen-time" ]

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "power_profile"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-3", "lockscreen-login-box@DP-2", "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 70.0
    box_width = 400.0
    cx = 1720.0
    cy = 1321.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 1081.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[notification]
monitors = [ "DP-3" ]

[osd]
monitors = [ "DP-3" ]

[shell]
password_style = "random"
polkit_agent = true
telemetry_enabled = true

    [shell.launcher]
    categories = false
    compact = true
    show_icons = false

    [shell.panel]
    control_center_placement = "floating"
    open_near_click_control_center = true

[wallpaper.default]
path = "/nix/store/w3qm63cg0zx5mhzgqv432lk1h79ghg8b-wallpapers/nice-blue-background.png"

[wallpaper.last]
path = "/nix/store/w3qm63cg0zx5mhzgqv432lk1h79ghg8b-wallpapers/nice-blue-background.png"

[wallpaper.monitors.DP-2]
path = "/nix/store/w3qm63cg0zx5mhzgqv432lk1h79ghg8b-wallpapers/nice-blue-background.png"

[wallpaper.monitors.DP-3]
path = "/nix/store/w3qm63cg0zx5mhzgqv432lk1h79ghg8b-wallpapers/nice-blue-background.png"

[wallpaper.monitors.HDMI-A-1]
path = "/nix/store/w3qm63cg0zx5mhzgqv432lk1h79ghg8b-wallpapers/nice-blue-background.png"

[widget.date]
format = "{:%a, %d %b}"

[widget.tray]
capsule = true
capsule_fill = "outline"